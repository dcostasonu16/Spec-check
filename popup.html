<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            /* Updated to the Aurora Palette */
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7); /* Translucent for glass effect */
            --accent-primary: #4f46e5; /* Deep Indigo */
            --accent-glow: #8b5cf6;    /* Electric Violet */
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #10b981; /* Emerald Green */
        }

        body {
            width: 320px;
            background-color: var(--bg-dark);
            /* Soft gradient background to mimic the aurora feel */
            background-image: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo-area h1 {
            font-size: 18px;
            margin: 0;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .status-badge {
            font-size: 10px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .stat-value {
            display: block;
            font-size: 24px;
            font-weight: 800;
            color: var(--accent-glow);
            text-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .settings-list {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 8px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .setting-item:last-child { border-bottom: none; }

        /* Modernized Switch Styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 22px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background: linear-gradient(135deg, var(--accent-primary), var(--accent-glow)); }
        input:checked + .slider:before { transform: translateX(16px); }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-glow) 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 10px;
            color: var(--text-dim);
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <h1>SPEC-CHECK</h1>
        </div>
        <div class="status-badge">ACTIVE</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-value" id="leaks-blocked">0</span>
            <span class="stat-label">Blocked</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">100%</span>
            <span class="stat-label">Local Only</span>
        </div>
    </div>

    <div class="settings-list">
        <div class="setting-item">
            <span>Identity (Email, ID, Phone)</span>
            <label class="switch">
                <input type="checkbox" id="toggle-identity" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div class="setting-item">
            <span>API & Cloud</span>
            <label class="switch">
                <input type="checkbox" id="toggle-secrets" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div class="setting-item">
            <span>Network (IP) Shield</span>
            <label class="switch">
                <input type="checkbox" id="toggle-network" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <button class="btn-primary" id="reportBtn">Generate Security Report</button>

    <div class="footer">
        Securing AI Prompts in Real-Time
    </div>

    <script src="popup.js"></script>
</body>
</html>
