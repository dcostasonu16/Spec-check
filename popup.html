<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            width: 300px;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .shield-icon {
            color: var(--accent-blue);
            font-size: 20px;
        }

        h1 {
            font-size: 16px;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .status-badge {
            font-size: 10px;
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
            padding: 2px 8px;
            border-radius: 12px;
            border: 1px solid var(--success);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #334155;
        }

        .stat-value {
            display: block;
            font-size: 18px;
            font-weight: bold;
            color: var(--accent-blue);
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .settings-list {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 8px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            font-size: 12px;
            border-bottom: 1px solid #334155;
        }

        .setting-item:last-child { border-bottom: none; }

        .btn-primary {
            width: 100%;
            background: var(--accent-blue);
            color: var(--bg-dark);
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-primary:hover { opacity: 0.9; }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 10px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <h1>SPEC-CHECK</h1>
        </div>
        <div class="status-badge">ACTIVE</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-value" id="leaks-blocked">0</span>
            <span class="stat-label">Blocked</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">100%</span>
            <span class="stat-label">Privacy</span>
        </div>
    </div>

<style>
.switch {
  position: relative;
  display: inline-block;
  width: 34px;
  height: 20px;
}
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #334155;
  transition: .4s; border-radius: 34px;
}
.slider:before {
  position: absolute; content: "";
  height: 14px; width: 14px;
  left: 3px; bottom: 3px;
  background-color: white;
  transition: .4s; border-radius: 50%;
}
input:checked + .slider { background-color: var(--accent-blue); }
input:checked + .slider:before { transform: translateX(14px); }
</style>

<div class="settings-list">
    <div class="setting-item">
        <span>Identity & School</span>
        <label class="switch">
            <input type="checkbox" id="toggle-identity" checked>
            <span class="slider"></span>
        </label>
    </div>
    <div class="setting-item">
        <span>API & Cloud Secrets</span>
        <label class="switch">
            <input type="checkbox" id="toggle-secrets" checked>
            <span class="slider"></span>
        </label>
    </div>
    <div class="setting-item">
        <span>Network (IP) Shield</span>
        <label class="switch">
            <input type="checkbox" id="toggle-network" checked>
            <span class="slider"></span>
        </label>
    </div>
</div>

    <button class="btn-primary" id="reportBtn">Generate Full Report</button>

    <div class="footer">
        Securing AI Prompts in Real-Time
    </div>

    <script src="popup.js"></script>
</body>
